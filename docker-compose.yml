version: '3.8'
services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - CACHE_TTL_MS=3600000
      - MAX_CACHE_SIZE=1000
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX=20
      - PORTAL_FETCH_COOLDOWN_MS=300000
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  redis-data:
